<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>SmalLog — Solicitar Entrega</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
     background:#f0f4f8;padding:16px;min-height:100vh}
.card{background:#fff;border-radius:16px;padding:24px;
      max-width:440px;margin:0 auto;
      box-shadow:0 4px 20px rgba(0,0,0,.08)}
.header{text-align:center;margin-bottom:20px}
.header h1{color:#00BCD4;font-size:24px;font-weight:700;letter-spacing:-0.5px}
.header p{color:#888;font-size:13px;margin-top:4px}
.contador{display:flex;align-items:center;justify-content:center;
          gap:8px;margin-bottom:20px}
.badge-count{background:#00BCD4;color:#fff;border-radius:20px;
             padding:4px 14px;font-size:14px;font-weight:700}
.badge-count.vazio{background:#e0e0e0;color:#999}
.editando-aviso{background:#fff8e1;border:1px solid #FFC107;
                border-radius:8px;padding:10px 14px;margin-bottom:16px;
                font-size:13px;color:#F57F17;display:none}
.campo{margin-bottom:14px}
label{display:block;font-size:12px;font-weight:600;color:#555;
      margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
input,textarea{width:100%;padding:13px;border:1.5px solid #e0e0e0;
      border-radius:10px;font-size:16px;color:#333;
      transition:border-color .2s;-webkit-appearance:none;
      font-family:inherit}
input:focus,textarea:focus{border-color:#00BCD4;outline:none;
            box-shadow:0 0 0 3px rgba(0,188,212,.1)}
input::placeholder,textarea::placeholder{color:#bbb;font-size:14px}
textarea{resize:none}
.req{color:#f44336;margin-left:2px}
.divider{border:none;border-top:1px solid #eee;margin:20px 0}
.btn{width:100%;padding:14px;border:none;border-radius:12px;
     font-size:15px;font-weight:700;cursor:pointer;
     display:flex;align-items:center;justify-content:center;gap:8px;
     margin-bottom:10px;transition:opacity .2s}
.btn:active{opacity:.85}
.btn-add{background:#00BCD4;color:#fff}
.btn-ver{background:#f0f9ff;color:#00BCD4;border:1.5px solid #00BCD4}
.btn-enviar{background:#25D366;color:#fff}
.btn-enviar:disabled{background:#ccc;cursor:not-allowed;opacity:1}
.aviso{text-align:center;color:#aaa;font-size:11px;
       margin-top:12px;line-height:1.6}
.aviso a{color:#00BCD4;text-decoration:none}

/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);
         z-index:100;align-items:flex-end}
.overlay.ativo{display:flex}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:20px;
       width:100%;max-height:82vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;
              margin-bottom:16px}
.modal-header h2{font-size:16px;font-weight:700}
.btn-fechar{background:none;border:none;font-size:22px;
            cursor:pointer;color:#888;padding:4px 8px}
.item-entrega{background:#f8f9fa;border-radius:10px;padding:12px;
              margin-bottom:10px;border-left:3px solid #00BCD4}
.item-entrega strong{display:block;color:#333;font-size:14px;margin-bottom:4px}
.item-entrega span{color:#666;font-size:13px;line-height:1.5}
.obs-tag{display:inline-block;background:#e3f2fd;color:#1565C0;
         border-radius:6px;padding:2px 8px;font-size:11px;margin-top:4px}
.item-acoes{display:flex;gap:8px;margin-top:10px}
.btn-editar{flex:1;padding:9px;background:#f0f9ff;color:#00BCD4;
            border:1.5px solid #00BCD4;border-radius:8px;
            font-size:13px;font-weight:700;cursor:pointer}
.btn-remover{flex:1;padding:9px;background:#fff5f5;color:#f44336;
             border:1.5px solid #ffcdd2;border-radius:8px;
             font-size:13px;font-weight:700;cursor:pointer}
.btn-editar:active{background:#e0f5fb}
.btn-remover:active{background:#ffebee}
.num-circle{display:inline-flex;align-items:center;justify-content:center;
            width:22px;height:22px;background:#00BCD4;color:#fff;
            border-radius:50%;font-size:11px;font-weight:700;margin-right:6px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
       background:#333;color:#fff;padding:10px 20px;border-radius:20px;
       font-size:13px;opacity:0;transition:opacity .3s;z-index:200;
       white-space:nowrap;pointer-events:none}
.toast.show{opacity:1}

/* Confirmação */
.confirm-overlay{display:none;position:fixed;inset:0;
                 background:rgba(0,0,0,.5);z-index:150;
                 align-items:center;justify-content:center;padding:20px}
.confirm-overlay.ativo{display:flex}
.confirm-box{background:#fff;border-radius:16px;padding:24px;
             max-width:360px;width:100%;text-align:center}
.confirm-box h3{font-size:18px;margin-bottom:8px}
.confirm-box p{color:#666;font-size:14px;margin-bottom:20px;line-height:1.5}
.confirm-btns{display:flex;gap:10px}
.confirm-btns button{flex:1;padding:13px;border:none;border-radius:10px;
                     font-size:14px;font-weight:700;cursor:pointer}
.btn-conferir{background:#f0f9ff;color:#00BCD4;
              border:1.5px solid #00BCD4!important}
.btn-enviar-agora{background:#25D366;color:#fff}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>📦 SmalLog</h1>
    <p>Solicite entregas para o motoboy</p>
  </div>

  <div class="contador">
    <span id="badge" class="badge-count vazio">0 entregas</span>
  </div>

  <!-- Aviso de edição -->
  <div class="editando-aviso" id="editando-aviso">
    ✏️ Editando entrega — corrija e toque em "Salvar"
  </div>

  <!-- Formulário -->
  <div class="campo">
    <label>Nome completo<span class="req">*</span></label>
    <input type="text" id="nome" placeholder="Ex: João da Silva" autocapitalize="words">
  </div>
  <div class="campo">
    <label>CEP<span class="req">*</span></label>
    <input type="tel" id="cep" placeholder="00000-000" maxlength="9"
           inputmode="numeric" oninput="fmtCepBusca(this)">
  </div>
  <div class="campo">
    <label>Logradouro<span class="req">*</span></label>
    <input type="text" id="end" placeholder="Preenchido automaticamente pelo CEP">
  </div>
  <div class="campo">
    <label>Número<span class="req">*</span></label>
    <input type="text" id="num" placeholder="Ex: 123, S/N">
  </div>
  <div class="campo">
    <label>Complemento</label>
    <input type="text" id="comp" placeholder="Apto, bloco (opcional)">
  </div>
  <div class="campo">
    <label>Cidade / Estado<span class="req">*</span></label>
    <input type="text" id="cid" placeholder="Preenchido automaticamente pelo CEP">
  </div>
  <div class="campo">
    <label>Observações</label>
    <textarea id="obs" rows="2"
      placeholder="Ex: Ligar antes, receber R$ 50, entregar às 18h..."></textarea>
  </div>

  <hr class="divider">

  <button class="btn btn-add" id="btn-salvar" onclick="salvarEntrega()">
    ➕ Salvar e adicionar outra
  </button>

  <button class="btn btn-ver" id="btn-ver" onclick="abrirModal()" style="display:none">
    📋 Ver todas (<span id="count-ver">0</span>)
  </button>

  <button class="btn btn-enviar" id="btn-enviar" onclick="confirmarEnvio()" disabled>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413z"/>
    </svg>
    Enviar pelo WhatsApp
  </button>

  <p class="aviso">
    Dados enviados diretamente ao entregador.<br>
    <a href="mailto:suporte@smallog.app">suporte@smallog.app</a>
  </p>
</div>

<!-- Modal ver todas -->
<div class="overlay" id="overlay" onclick="fecharModalFora(event)">
  <div class="modal">
    <div class="modal-header">
      <h2>📋 Entregas adicionadas</h2>
      <button class="btn-fechar" onclick="fecharModal()">✕</button>
    </div>
    <div id="lista-modal"></div>
    <button class="btn btn-enviar" onclick="fecharModal();enviarAgora()"
            style="margin-top:8px">
      ✅ Enviar pelo WhatsApp
    </button>
  </div>
</div>

<!-- Confirmação de envio -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <h3>📦 Pronto para enviar!</h3>
    <p id="confirm-msg"></p>
    <div class="confirm-btns">
      <button class="btn-conferir" onclick="fecharConfirm();abrirModal()">
        📋 Conferir
      </button>
      <button class="btn-enviar-agora" onclick="fecharConfirm();enviarAgora()">
        ✅ Enviar agora
      </button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
var telefone = new URLSearchParams(window.location.search).get('tel') || '5500000000000';
var entregas = [];
var indiceEditando = -1; // -1 = nova entrega, >= 0 = editando

function val(id) {
  var el = document.getElementById(id);
  return el ? el.value.trim() : '';
}

function set(id, v) {
  var el = document.getElementById(id);
  if (el) el.value = v || '';
}

function limparFormulario() {
  ['nome','cep','end','num','comp','cid','obs'].forEach(function(id) { set(id,''); });
  indiceEditando = -1;
  document.getElementById('editando-aviso').style.display = 'none';
  document.getElementById('btn-salvar').textContent = '➕ Salvar e adicionar outra';
  document.getElementById('nome').focus();
}

function mostrarToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

function atualizarUI() {
  var n = entregas.length;
  var badge = document.getElementById('badge');
  badge.textContent = n + (n === 1 ? ' entrega' : ' entregas');
  badge.className = 'badge-count' + (n === 0 ? ' vazio' : '');
  document.getElementById('count-ver').textContent = n;
  document.getElementById('btn-ver').style.display = n > 0 ? 'flex' : 'none';
  document.getElementById('btn-enviar').disabled = n === 0;
}

function fmtCepBusca(input) {
  var v = input.value.replace(/\D/g,'');
  if (v.length > 5) v = v.slice(0,5)+'-'+v.slice(5,8);
  input.value = v;
  if (v.replace('-','').length === 8) buscarCep(v.replace('-',''));
}

function buscarCep(cep) {
  fetch('https://viacep.com.br/ws/'+cep+'/json/')
    .then(function(r){ return r.json(); })
    .then(function(d) {
      if (!d.erro) {
        var logr = (d.logradouro||'')+(d.bairro?', '+d.bairro:'');
        var cid  = (d.localidade||'')+(d.uf?' - '+d.uf:'');
        if (logr) set('end', logr);
        if (cid)  set('cid', cid);
        document.getElementById('num').focus();
      }
    }).catch(function(){});
}

function salvarEntrega() {
  var nome=val('nome'), logr=val('end'), num=val('num'),
      cep=val('cep'), cid=val('cid'), comp=val('comp'), obs=val('obs');

  if (!nome) { alert('Informe o nome do destinatário'); document.getElementById('nome').focus(); return; }
  if (!cep||cep.replace('-','').length<8) { alert('Informe um CEP válido'); document.getElementById('cep').focus(); return; }
  if (!logr) { alert('Informe o logradouro'); document.getElementById('end').focus(); return; }
  if (!num)  { alert('Informe o número'); document.getElementById('num').focus(); return; }
  if (!cid)  { alert('Informe a cidade'); document.getElementById('cid').focus(); return; }

  var entrega = {
    nome: nome,
    endereco: logr+', '+num,
    complemento: comp,
    cep: cep.replace('-',''),
    cidade: cid,
    nf: '',
    obs: obs
  };

  if (indiceEditando >= 0) {
    // Substitui a entrega editada
    entregas[indiceEditando] = entrega;
    mostrarToast('✅ Entrega '+(indiceEditando+1)+' atualizada!');
  } else {
    entregas.push(entrega);
    mostrarToast('✅ Entrega '+entregas.length+' adicionada!');
  }

  atualizarUI();
  limparFormulario();
}

// ── Modal ─────────────────────────────────────────────────

function abrirModal() {
  renderizarLista();
  document.getElementById('overlay').classList.add('ativo');
}

function fecharModal() {
  document.getElementById('overlay').classList.remove('ativo');
}

function fecharModalFora(e) {
  if (e.target === document.getElementById('overlay')) fecharModal();
}

function renderizarLista() {
  var div = document.getElementById('lista-modal');
  if (entregas.length === 0) {
    div.innerHTML = '<p style="text-align:center;color:#aaa;padding:20px">Nenhuma entrega adicionada.</p>';
    return;
  }
  div.innerHTML = entregas.map(function(e, i) {
    return '<div class="item-entrega">'+
      '<strong><span class="num-circle">'+(i+1)+'</span>'+e.nome+'</strong>'+
      '<span>'+e.endereco+'</span><br>'+
      '<span>CEP: '+e.cep+' | '+e.cidade+'</span>'+
      (e.complemento?'<br><span>Comp: '+e.complemento+'</span>':'')+
      (e.obs?'<br><span class="obs-tag">📝 '+e.obs+'</span>':'')+
      '<div class="item-acoes">'+
        '<button class="btn-editar" onclick="editarEntrega('+i+')">✏️ Editar</button>'+
        '<button class="btn-remover" onclick="removerEntrega('+i+')">🗑️ Remover</button>'+
      '</div>'+
      '</div>';
  }).join('');
}

function editarEntrega(i) {
  var e = entregas[i];

  // Separa logradouro e número
  var endParts = e.endereco.split(', ');
  var num = endParts.length > 1 ? endParts[endParts.length-1] : '';
  var logr = endParts.length > 1 ? endParts.slice(0,-1).join(', ') : e.endereco;

  // Preenche formulário
  set('nome', e.nome);
  set('end',  logr);
  set('num',  num);
  set('comp', e.complemento);
  // Formata CEP
  var cep = e.cep;
  if (cep.length === 8) cep = cep.slice(0,5)+'-'+cep.slice(5);
  set('cep', cep);
  set('cid', e.cidade);
  set('obs', e.obs);

  // Marca índice em edição
  indiceEditando = i;
  document.getElementById('editando-aviso').style.display = 'block';
  document.getElementById('btn-salvar').textContent = '💾 Salvar alterações';

  fecharModal();

  // Scroll para o topo do formulário
  window.scrollTo({top:0, behavior:'smooth'});
  document.getElementById('nome').focus();
  mostrarToast('✏️ Editando entrega '+(i+1));
}

function removerEntrega(i) {
  if (!confirm('Remover entrega de "'+entregas[i].nome+'"?')) return;
  entregas.splice(i, 1);
  atualizarUI();
  renderizarLista();
  mostrarToast('🗑️ Entrega removida');
}

// ── Confirmação e envio ───────────────────────────────────

function confirmarEnvio() {
  if (entregas.length === 0) return;

  var nomeAtual = val('nome');
  if (nomeAtual && indiceEditando < 0) {
    if (!confirm('Você tem dados não salvos ('+nomeAtual+'). Ignorar e enviar as '+entregas.length+' entrega(s) já adicionadas?')) return;
  }

  var n = entregas.length;
  document.getElementById('confirm-msg').textContent =
    'Você tem '+n+' entrega'+(n>1?'s':'')+
    '. Deseja conferir antes de enviar?';
  document.getElementById('confirm-overlay').classList.add('ativo');
}

function fecharConfirm() {
  document.getElementById('confirm-overlay').classList.remove('ativo');
}

function enviarAgora() {
  if (entregas.length === 0) return;

  var linkBatch = gerarLinkBatch(entregas);

  var resumo = entregas.map(function(e, i) {
    return '--- Entrega '+(i+1)+' ---\n'+
      'Nome: '+e.nome+'\n'+
      'Endereço: '+e.endereco+'\n'+
      'CEP: '+e.cep+'\n'+
      'Cidade: '+e.cidade+
      (e.complemento?'\nComplemento: '+e.complemento:'')+
      (e.obs?'\nObs: '+e.obs:'');
  }).join('\n\n');

  var msg = '📦 *Pedidos de Entrega — SmalLog*\n\n'+
    resumo+'\n\n'+
    '👉 *Abrir tudo no app:*\n'+linkBatch+
    '\n\n_Enviado via SmalLog_';

  window.open('https://wa.me/'+telefone+'?text='+encodeURIComponent(msg),'_blank');
}

function gerarLinkBatch(lista) {
  var json = JSON.stringify(lista);
  var base64 = btoa(unescape(encodeURIComponent(json)));
  return 'https://www.smallog.app/redirect.html?batch='+encodeURIComponent(base64);
}

atualizarUI();
</script>
</body>
</html>
